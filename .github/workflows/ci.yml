name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-and-typecheck:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.4.7

      - name: Lint Python services
        run: ruff check services/

      - name: Set up Node 20 with pnpm
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack / pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install

      - name: TypeScript type-check
        working-directory: frontend
        run: pnpm run type-check

  test-services:
    name: Test Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install auth service deps
        working-directory: services/auth
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Smoke-test auth service
        working-directory: services/auth
        env:
          DATABASE_URL: "postgresql+asyncpg://user:password@localhost:5432/test_db"
          REDIS_URL: "redis://localhost:6379/0"
          JWT_SECRET: "test-secret"
        run: |
          python -c "from main import app; print('auth import OK')"

      - name: Install catalog service deps
        working-directory: services/catalog
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Smoke-test catalog service
        working-directory: services/catalog
        env:
          DATABASE_URL: "postgresql+asyncpg://user:password@localhost:5432/test_db"
        run: |
          python -c "from main import app; print('catalog import OK')"

      - name: Install orders service deps
        working-directory: services/orders
        run: pip install -r requirements.txt pytest pytest-asyncio httpx

      - name: Smoke-test orders service
        working-directory: services/orders
        env:
          DATABASE_URL: "postgresql+asyncpg://user:password@localhost:5432/test_db"
        run: |
          python -c "from main import app; print('orders import OK')"

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint-and-typecheck, test-services]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth image
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth
          push: false
          tags: microservices-demo/auth:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build catalog image
        uses: docker/build-push-action@v5
        with:
          context: ./services/catalog
          push: false
          tags: microservices-demo/catalog:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build orders image
        uses: docker/build-push-action@v5
        with:
          context: ./services/orders
          push: false
          tags: microservices-demo/orders:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: false
          tags: microservices-demo/frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build auth image for scan
        run: docker build -t microservices-demo/auth:scan ./services/auth

      - name: Scan auth image
        uses: aquasecurity/trivy-action@0.23.0
        with:
          image-ref: "microservices-demo/auth:scan"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Build catalog image for scan
        run: docker build -t microservices-demo/catalog:scan ./services/catalog

      - name: Scan catalog image
        uses: aquasecurity/trivy-action@0.23.0
        with:
          image-ref: "microservices-demo/catalog:scan"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Build orders image for scan
        run: docker build -t microservices-demo/orders:scan ./services/orders

      - name: Scan orders image
        uses: aquasecurity/trivy-action@0.23.0
        with:
          image-ref: "microservices-demo/orders:scan"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

      - name: Build frontend image for scan
        run: docker build -t microservices-demo/frontend:scan ./frontend

      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.23.0
        with:
          image-ref: "microservices-demo/frontend:scan"
          format: "table"
          exit-code: "0"
          severity: "CRITICAL,HIGH"

  sonarqube-placeholder:
    name: SonarQube Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: test-services
    steps:
      - uses: actions/checkout@v4
      - name: SonarQube scan
        run: echo "SonarQube scan would run here"
