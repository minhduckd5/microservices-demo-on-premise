#ansible.cfg
[defaults]
# Inventory
inventory = ansible/inventory/hosts.yml
host_key_checking = False

# Execution
forks = 5
timeout = 300
transport = ssh

# Privilege escalation
[privilege_escalation]
become = True
become_method = sudo
become_user = root

# SSH settings
[ssh_connection]
ssh_args = -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True
