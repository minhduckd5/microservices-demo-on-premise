---
- name: Baseline configuration for all nodes
  hosts: all
  become: true
  gather_facts: true

  roles:
    - baseline

- name: Install K3s on controller
  hosts: controller
  become: true
  tasks:
    - name: Install K3s server
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Wait for K3s to be ready
      ansible.builtin.wait_for:
        path: /etc/rancher/k3s/k3s.yaml
        state: present
        timeout: 120

    - name: Fetch K3s token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Set k3s_token fact
      ansible.builtin.set_fact:
        k3s_token: "{{ k3s_token_raw['content'] | b64decode | trim }}"

- name: Join workers to K3s cluster
  hosts: workers
  become: true
  vars:
    k3s_server_url: "https://192.168.56.10:6443"
  tasks:
    - name: Install K3s agent
      ansible.builtin.shell: |
        curl -sfL https://get.k3s.io | K3S_URL={{ k3s_server_url }} K3S_TOKEN={{ hostvars['192.168.56.10']['k3s_token'] }} sh -
      args:
        creates: /usr/local/bin/k3s
