apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog
  namespace: microservices
  labels:
    app.kubernetes.io/name: catalog
    app.kubernetes.io/version: "1.0.0"
    chaos-mesh-enabled: "true"
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: catalog
  template:
    metadata:
      labels:
        app.kubernetes.io/name: catalog
        app.kubernetes.io/version: "1.0.0"
        chaos-mesh-enabled: "true"
    spec:
      containers:
        - name: catalog
          image: microservices-demo/catalog:1.0.0
          ports:
            - containerPort: 8002
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://user:password@postgres-catalog:5432/catalog_db"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8002
            initialDelaySeconds: 5
            periodSeconds: 5
