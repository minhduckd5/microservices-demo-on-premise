apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

resources:
- otel-collector-onprem.yaml

# Patch all services to point to the collector
patches:
- patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: checkoutservice
    spec:
      template:
        spec:
          containers:
            - name: server
              env:
              - name: COLLECTOR_SERVICE_ADDR
                value: "opentelemetrycollector:4317"
              - name: OTEL_SERVICE_NAME
                value: "checkoutservice"
              - name: ENABLE_TRACING
                value: "1"
              - name: ENABLE_PROFILER
                value: "0"
